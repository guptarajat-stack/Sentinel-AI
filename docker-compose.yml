version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: soc-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: ai_security_soc
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    container_name: soc-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/ai_security_soc?schema=public
      - PORT=5000
      - NODE_ENV=development
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    container_name: soc-frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    depends_on:
      - backend

  agents:
    build:
      context: ./agents
      dockerfile: ../docker/agents.Dockerfile
    container_name: soc-agents
    restart: always
    environment:
      - BACKEND_URL=http://backend:5000
      - DB_URL=postgresql://postgres:password123@db:5432/ai_security_soc?schema=public
    depends_on:
      - backend

volumes:
  pgdata:
